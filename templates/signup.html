{% extends "base.html" %}

{% block title %} Sign Up {% endblock %}

{% block content %}
    <div class="signup">
        <h2>Create a Verto Account</h2>
        <form method="POST", enctype="multipart/form-data">
            <input type="text" name="username" id="username" placeholder="Verto User" required>
            <input type="email" name="email" id="email" placeholder="someone@example.com" required>
            <input type="password" name="password" id="password" placeholder="123456" required>
            <input type="text" name="skill" id="skill" placeholder="Your Skill or need(e.g. Photographer or in need of a photographer)" required>
            <textarea name="bio" id="bio" placeholder="Tell us about yourself" required></textarea>
            <input type="file" name="profile_pic">
            <select name="role" id="user_type" required>
                <option value="creative">Creative</option>
                <option value="client">Client</option>
            </select>
            <button type="submit">Create Account</button>
        </form>

        <p class="alt-link">Already have an account? <a href="/login">Log in</a></p>
    </div>

    <footer>
        <p>Quick Links: <a href="/">Home</a> | <a href="/">About</a> | <a href="/">Contact</a></p>
        <p>&copy; 2026 Verto</p>
    </footer>
{% endblock %}
